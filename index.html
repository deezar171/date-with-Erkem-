<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Invitation</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#ffd6e8,#ffeaf3);
  overflow:hidden;
}

.container{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  color:#ff4d88;
}

.card{
  padding:40px;
  background:rgba(255,255,255,0.9);
  border-radius:20px;
}

h1{
  font-size:34px;
  margin-bottom:20px;
}

button{
  padding:15px 35px;
  font-size:18px;
  border:none;
  border-radius:25px;
  background:#ff4d88;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">
    <h1>💗 Ты пойдёшь со мной на свидание? 💗</h1>
    <button onclick="location.href='place.html'">ДА 💓</button>
  </div>
</div>

<script>
(function(){
  if(!window.music){
    window.music = new Audio("brent.mp3");
    window.music.loop = true;
    window.music.volume = 1;
  }

  window.addEventListener("load", ()=>{
    window.music.play().catch(()=>{});
  });
})();
</script>
<script>
window.addEventListener("load", () => {
  document.getElementById("music").play().catch(()=>{});
});
</script>

</body>
</html>
