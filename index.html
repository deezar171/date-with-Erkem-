<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Invitation</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#ffd6e8,#ffeaf3);
  overflow:hidden;
}

.container{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  color:#ff4d88;
  z-index:2;
}

.card{
  padding:40px;
  background:rgba(255,255,255,0.9);
  border-radius:20px;
}

h1{
  font-size:34px;
  margin-bottom:20px;
}

button{
  padding:15px 35px;
  font-size:18px;
  border:none;
  border-radius:25px;
  background:#ff4d88;
  color:white;
  cursor:pointer;
}

/* ===== FALLING ANIMATION ===== */
.fall{
  position:fixed;
  top:-10px;
  font-size:22px;
  animation: fall linear infinite;
  pointer-events:none;
  z-index:1;
}

@keyframes fall{
  0%{
    transform:translateY(-10vh) rotate(0deg);
    opacity:1;
  }
  100%{
    transform:translateY(110vh) rotate(360deg);
    opacity:0;
  }
}
</style>
</head>

<body>

<!-- UI -->
<div class="container">
  <div class="card">
    <h1>Ты пойдёшь со мной на свидание? 💗</h1>
    <button onclick="goNext()">ДА</button>
  </div>
</div>

<script>
function goNext(){
  location.href="place.html";
}

/* ===== FALLING HEARTS & FLOWERS ===== */
function createItem(){
  const el = document.createElement("div");
  el.classList.add("fall");

  const items = ["🤍","🌸","🤍","🌸","💮"];
  el.innerText = items[Math.floor(Math.random()*items.length)];

  el.style.left = Math.random()*100 + "vw";
  el.style.animationDuration = (3 + Math.random()*5) + "s";
  el.style.fontSize = (16 + Math.random()*18) + "px";

  document.body.appendChild(el);

  setTimeout(()=>el.remove(), 8000);
}

setInterval(createItem, 200);
</script>

</body>
</html>
