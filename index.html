<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Invitation</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ffd6e8, #ffeaf3);
  overflow: hidden;
}

/* центр */
.container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  text-align: center;
  color: #ff4d88;
}

/* карточка */
.card {
  padding: 30px;
  background: rgba(255,255,255,0.85);
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

/* заголовок */
h1 {
  font-size: 26px;
  margin-bottom: 20px;
}

/* поля */
select, input {
  padding: 10px;
  margin: 10px;
  border-radius: 12px;
  border: none;
  outline: none;
}

/* кнопка */
button {
  margin-top: 20px;
  padding: 12px 25px;
  border-radius: 20px;
  border: none;
  background: #ff4d88;
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

/* результат */
#result {
  margin-top: 15px;
  font-size: 16px;
  color: #ff4d88;
  font-weight: bold;
}

/* 🤍 сердечки */
.heart {
  position: absolute;
  color: white;
  font-size: 18px;
  animation: float 6s linear infinite;
  text-shadow: 0 0 10px rgba(255,255,255,0.8);
}

@keyframes float {
  0% {transform: translateY(100vh); opacity: 0;}
  20% {opacity: 1;}
  100% {transform: translateY(-10vh); opacity: 0;}
}

/* 🌸 цветочки */
.flower {
  position: absolute;
  font-size: 20px;
  color: #ff69b4;
  animation: fall 10s linear infinite;
}

@keyframes fall {
  0% {transform: translateY(-10vh); opacity: 0;}
  20% {opacity: 1;}
  100% {transform: translateY(110vh); opacity: 0;}
}
</style>
</head>

<body>

<!-- 🌸 цветочки -->
<script>
setInterval(() => {
  const flower = document.createElement("div");
  flower.className = "flower";
  flower.innerHTML = "🌸";
  flower.style.left = Math.random() * 100 + "vw";
  flower.style.fontSize = (15 + Math.random() * 20) + "px";
  document.body.appendChild(flower);

  setTimeout(() => flower.remove(), 10000);
}, 400);
</script>

<!-- 🤍 сердечки -->
<script>
setInterval(() => {
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "🤍";
  heart.style.left = Math.random() * 100 + "vw";
  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 6000);
}, 350);
</script>

<!-- контент -->
<div class="container">
  <div class="card">

    <h1>Ты пойдёшь со мной на свидание? 💗</h1>

    <select id="date">
      <option>26</option>
      <option>27</option>
      <option>28</option>
    </select>

    <br>

    <label>Время (13:00 – 22:00)</label><br>
    <input id="time" type="time" min="13:00" max="22:00" value="18:00">

    <br>

    <button onclick="sendAnswer()">Да 💓</button>

    <div id="result"></div>

  </div>
</div>

<!-- музыка -->
<audio autoplay loop>
  <source src="brent.mp3" type="audio/mpeg">
</audio>

<script>
function sendAnswer() {
  const date = document.getElementById("date").value;
  const time = document.getElementById("time").value;

  document.getElementById("result").innerHTML =
    "💗 Она выбрала: " + date + " число<br>" +
    "⏰ Время: " + time + "<br><br>" +
    "бейбигерл, буду ждать вас 🤍";
}
</script>

</body>
</html>
