<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Invitation</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#ffd6e8,#ffeaf3);
  overflow:hidden;
}

.container{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}

.card{
  padding:40px;
  background:rgba(255,255,255,0.9);
  border-radius:20px;
}

h1{
  font-size:34px;
  color:#ff4d88;
}

button{
  padding:15px 35px;
  font-size:18px;
  border:none;
  border-radius:25px;
  background:#ff4d88;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">
    <h1>💗 Ты пойдёшь со мной на свидание?</h1>
    <button onclick="location.href='place.html'">ДА 💓</button>
  </div>
</div>

<!-- 🎵 МУЗЫКА (ИСПРАВЛЕНО) -->
<script>
(function () {

  if (!window.__music) {
    window.__music = new Audio("brent.mp3");
    window.__music.loop = true;
    window.__music.volume = 1;
  }

  const music = window.__music;

  window.addEventListener("load", () => {
    const saved = localStorage.getItem("music_started");

    if (!saved) {
      music.play().then(() => {
        localStorage.setItem("music_started", "1");
      }).catch(() => {});
    } else {
      music.play().catch(() => {});
    }
  });

})();
</script>

</body>
</html>
