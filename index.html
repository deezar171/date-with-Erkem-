<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Invitation</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ffd6e8, #ffeaf3);
  overflow: hidden;
  text-align: center;
  color: #ff4d88;
}

/* карточка */
.card {
  margin-top: 80px;
  display: inline-block;
  padding: 30px;
  background: rgba(255,255,255,0.7);
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  backdrop-filter: blur(5px);
}

/* заголовок */
h1 {
  font-size: 28px;
  margin-bottom: 20px;
}

/* элементы */
select, input {
  padding: 10px;
  margin: 10px;
  border-radius: 12px;
  border: none;
  outline: none;
}

/* кнопка */
button {
  margin-top: 20px;
  padding: 12px 25px;
  border-radius: 20px;
  border: none;
  background: #ff4d88;
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  background: #ff2f74;
}

/* сердечки */
.heart {
  position: absolute;
  color: white;
  font-size: 18px;
  animation: float 6s linear infinite;
}

@keyframes float {
  0% {transform: translateY(100vh); opacity: 0;}
  20% {opacity: 1;}
  100% {transform: translateY(-10vh); opacity: 0;}
}
</style>
</head>

<body>

<div class="card">

<h1>Ты пойдёшь со мной на свидание? 💗</h1>

<!-- дата -->
<select>
  <option>26</option>
  <option>27</option>
  <option>28</option>
</select>

<br>

<!-- время -->
<label>Время (13:00 – 22:00)</label><br>
<input type="time" min="13:00" max="22:00" value="18:00">

<br>

<button onclick="alert('Я жду тебя ❤️')">Да ❤️</button>

</div>

<!-- музыка -->
<audio autoplay loop>
  <source src="brent.mp3" type="audio/mpeg">
</audio>

<script>
setInterval(() => {
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "🤍";
  heart.style.left = Math.random() * 100 + "vw";
  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 6000);
}, 300);
</script>

</body>
</html>
