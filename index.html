<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Invitation</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#ffd6e8,#ffeaf3);
  overflow:hidden;
}

.container{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  color:#ff4d88;
  z-index:2;
}

.card{
  padding:40px;
  background:rgba(255,255,255,0.9);
  border-radius:20px;
}

h1{
  font-size:34px;
  margin-bottom:20px;
}

button{
  padding:15px 35px;
  font-size:18px;
  border:none;
  border-radius:25px;
  background:#ff4d88;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">
    <h1>Ты пойдёшь со мной на свидание? 💗</h1>
    <button onclick="goNext()">ДА</button>
  </div>
</div>

<script>
let music = new Audio("brent.mp3");
music.loop = true;
music.volume = 1;

function startMusic(){
  music.play().catch(()=>{});
}

function goNext(){
  startMusic();
  localStorage.setItem("musicStarted","1");
  location.href="place.html";
}
</script>

<script>
function createFalling(){
  const item = document.createElement("div");
  item.innerHTML = Math.random() > 0.5 ? "🤍" : "🌸";

  item.style.position = "fixed";
  item.style.left = Math.random()*100 + "vw";
  item.style.top = "-30px";
  item.style.fontSize = (18 + Math.random()*20) + "px";
  item.style.pointerEvents = "none";
  item.style.zIndex = "0";

  document.body.appendChild(item);

  setTimeout(()=>{
    item.style.transform = "translateY(110vh)";
    item.style.transition = "6s linear";
  },50);

  setTimeout(()=>item.remove(),6000);
}

setInterval(createFalling, 500);
</script>

</body>
</html>
