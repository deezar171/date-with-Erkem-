<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Invitation</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#ffd6e8,#ffeaf3);
  overflow:hidden;
}

.container{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  color:#ff4d88;
  z-index:2;
}

.card{
  padding:40px;
  background:rgba(255,255,255,0.9);
  border-radius:20px;
}

h1{
  font-size:34px;
  margin-bottom:20px;
}

button{
  padding:15px 35px;
  font-size:18px;
  border:none;
  border-radius:25px;
  background:#ff4d88;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">
    <h1>Ты пойдёшь со мной на свидание? 💗</h1>
    <button onclick="goNext()">ДА</button>
  </div>
</div>

<script>
let music = new Audio("brent.mp3");
music.loop = true;
music.volume = 1;

document.addEventListener("click", () => {
  music.play().catch(()=>{});
}, { once:true });

function goNext(){
  location.href="place.html";
}
</script>

</body>
</html>
