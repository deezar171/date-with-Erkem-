<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Выбор</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#ffd6e8,#ffeaf3);
  overflow:hidden;
}

.card{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:30px;
  border-radius:20px;
  text-align:center;
  width:360px;
  z-index:2;
}

h2{
  font-size:28px;
}

.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
  margin-top:10px;
}

.day{
  padding:10px;
  border-radius:10px;
  background:#eee;
  font-size:14px;
}

.active{
  background:#ff4d88;
  color:white;
  cursor:pointer;
}

.disabled{
  opacity:0.3;
}

.food{
  margin:5px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#ff4d88;
  color:white;
  cursor:pointer;
}

.times{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:8px;
}

.time-btn{
  padding:8px 14px;
  border:none;
  border-radius:10px;
  background:#ffb3cc;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="card">

<h2>📅 Выбери дату</h2>

<div class="calendar">
<script>
for(let i=1;i<=31;i++){
  if([26,27,28,29].includes(i)){
    document.write(`<div class='day active' onclick='setDay(${i})'>${i}</div>`);
  } else {
    document.write(`<div class='day disabled'>${i}</div>`);
  }
}
</script>
</div>

<h2>⏰ Выбери время</h2>

<div class="times">
  <button class="time-btn" onclick="setTime('15:00')">15:00</button>
  <button class="time-btn" onclick="setTime('17:00')">17:00</button>
  <button class="time-btn" onclick="setTime('19:00')">19:00</button>
  <button class="time-btn" onclick="setTime('21:00')">21:00</button>
</div>

<h2>🍽️ Выбор</h2>

<button class="food" onclick="choose('🍕 Пицца')">🍕 Пицца</button>
<button class="food" onclick="choose('🍔 Бургер')">🍔 Бургер</button>
<button class="food" onclick="choose('🍣 Суши')">🍣 Суши</button>
<button class="food" onclick="choose('🍝 Паста')">🍝 Паста</button>
<button class="food" onclick="choose('🍜 Рамен')">🍜 Рамен</button>
<button class="food" onclick="choose('🏠 Ночёвка')">🏠 Ночёвка</button>

</div>

<script>
let day = 26;
let selectedTime = "19:00";

function setDay(d){
  day = d;
}

function setTime(t){
  selectedTime = t;
}

function choose(place){
  localStorage.setItem("day",day);
  localStorage.setItem("time",selectedTime);
  localStorage.setItem("place",place);
  location.href="result.html";
}
</script>

<script>
function createFalling(){
  const item = document.createElement("div");
  item.innerHTML = Math.random() > 0.5 ? "🤍" : "🌸";

  item.style.position = "fixed";
  item.style.left = Math.random()*100 + "vw";
  item.style.top = "-30px";
  item.style.fontSize = (18 + Math.random()*20) + "px";
  item.style.pointerEvents = "none";
  item.style.zIndex = "0";

  document.body.appendChild(item);

  setTimeout(()=>{
    item.style.transform = "translateY(110vh)";
    item.style.transition = "6s linear";
  },50);

  setTimeout(()=>item.remove(),6000);
}

setInterval(createFalling, 500);
</script>

</body>
</html>
