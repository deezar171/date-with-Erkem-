<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Выбор</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#ffd6e8,#ffeaf3);
  overflow:hidden;
}

/* контейнер */
.card{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:25px;
  border-radius:20px;
  text-align:center;
  width:340px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* 📅 даты */
.days {
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:10px;
}

.day {
  background:white;
  padding:10px;
  border-radius:15px;
  width:70px;
  cursor:pointer;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  transition:0.3s;
}

.day:hover {
  transform:scale(1.05);
}

.big {
  font-size:22px;
  font-weight:bold;
  color:#ff4d88;
}

.small {
  font-size:12px;
  color:gray;
}

/* 🍽️ еда */
.foods {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:10px;
}

.food {
  background:white;
  padding:10px;
  border-radius:15px;
  cursor:pointer;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  transition:0.3s;
}

.food:hover {
  transform:scale(1.05);
}

.icon {
  font-size:24px;
}

.text {
  font-size:12px;
  color:#ff4d88;
}

/* 🌸🤍 эффекты */
.heart,.flower{
  position:absolute;
  pointer-events:none;
}

.heart{
  color:white;
  font-size:18px;
  animation:float 6s linear infinite;
}

.flower{
  font-size:20px;
  animation:fall 10s linear infinite;
}

@keyframes float{
  0%{transform:translateY(100vh);opacity:0;}
  20%{opacity:1;}
  100%{transform:translateY(-10vh);opacity:0;}
}

@keyframes fall{
  0%{transform:translateY(-10vh);opacity:0;}
  20%{opacity:1;}
  100%{transform:translateY(110vh);opacity:0;}
}

input{
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  border:none;
  background:#f5f5f5;
}
</style>
</head>

<body>

<div class="card">

<h2>📅 Выбери день</h2>

<div class="days">
  <div class="day" onclick="setDay(26)">
    <div class="big">26</div>
    <div class="small">Июнь</div>
  </div>

  <div class="day" onclick="setDay(27)">
    <div class="big">27</div>
    <div class="small">Июнь</div>
  </div>

  <div class="day" onclick="setDay(28)">
    <div class="big">28</div>
    <div class="small">Июнь</div>
  </div>
</div>

<br>

<input id="time" type="time" min="13:00" max="23:00">

<h3>🍽️ Куда пойдём</h3>

<div class="foods">

  <div class="food" onclick="choose('🍕 Пицца')">
    <div class="icon">🍕</div>
    <div class="text">Пицца</div>
  </div>

  <div class="food" onclick="choose('🍔 Бургер')">
    <div class="icon">🍔</div>
    <div class="text">Бургер</div>
  </div>

  <div class="food" onclick="choose('🍣 Суши')">
    <div class="icon">🍣</div>
    <div class="text">Суши</div>
  </div>

  <div class="food" onclick="choose('🍝 Паста')">
    <div class="icon">🍝</div>
    <div class="text">Паста</div>
  </div>

  <div class="food" onclick="choose('🚶 Прогулка')">
    <div class="icon">🚶</div>
    <div class="text">Прогулка</div>
  </div>

  <div class="food" onclick="choose('🍜 Рамен')">
    <div class="icon">🍜</div>
    <div class="text">Рамен</div>
  </div>

  <div class="food" onclick="choose('🏠 Ночёвка')">
    <div class="icon">🏠</div>
    <div class="text">Ночёвка</div>
  </div>

</div>

</div>

<script>
let day=26;

function setDay(d){
  day=d;
}

function choose(place){
  localStorage.setItem("day",day);
  localStorage.setItem("time",document.getElementById("time").value);
  localStorage.setItem("place",place);
  location.href="result.html";
}

/* 🌸🤍 эффекты */
setInterval(()=>{
  const h=document.createElement("div");
  h.className="heart";
  h.innerHTML="🤍";
  h.style.left=Math.random()*100+"vw";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),6000);
},300);

setInterval(()=>{
  const f=document.createElement("div");
  f.className="flower";
  f.innerHTML="🌸";
  f.style.left=Math.random()*100+"vw";
  document.body.appendChild(f);
  setTimeout(()=>f.remove(),10000);
},500);
</script>

</body>
</html>
