<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Выбор</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#ffd6e8,#ffeaf3);
  overflow:hidden;
}

.card{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:30px;
  border-radius:20px;
  text-align:center;
  width:360px;
}

h2{
  font-size:28px;
}

.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
  margin-top:10px;
}

.day{
  padding:10px;
  border-radius:10px;
  background:#eee;
  font-size:14px;
}

.active{
  background:#ff4d88;
  color:white;
  cursor:pointer;
}

.disabled{
  opacity:0.3;
}

.food{
  margin:5px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#ff4d88;
  color:white;
}
</style>
</head>

<body>

<div class="card">

<h2>📅 Выбери дату</h2>

<div class="calendar">
<script>
for(let i=1;i<=31;i++){
  if([26,27,28,29].includes(i)){
    document.write(`<div class='day active' onclick='setDay(${i})'>${i}</div>`);
  } else {
    document.write(`<div class='day disabled'>${i}</div>`);
  }
}
</script>
</div>

<br>

<input id="time" type="time" min="13:00" max="23:00">

<h2>🍽️ Выбор</h2>

<button class="food" onclick="choose('🍕 Пицца')">🍕 Пицца</button>
<button class="food" onclick="choose('🍔 Бургер')">🍔 Бургер</button>
<button class="food" onclick="choose('🍣 Суши')">🍣 Суши</button>
<button class="food" onclick="choose('🍝 Паста')">🍝 Паста</button>
<button class="food" onclick="choose('🍜 Рамен')">🍜 Рамен</button>
<button class="food" onclick="choose('🏠 Ночёвка')">🏠 Ночёвка</button>

</div>

<script>
let day=26;

function setDay(d){
  day=d;
}

function choose(place){
  localStorage.setItem("day",day);
  localStorage.setItem("time",document.getElementById("time").value);
  localStorage.setItem("place",place);
  location.href="result.html";
}
</script>

<script>
(function () {

  if (!window.music) {
    window.music = new Audio("brent.mp3");
    window.music.loop = true;
    window.music.volume = 1;
  }

  window.addEventListener("load", () => {
    // не даём стартовать заново если уже играет
    if (window.music.paused) {
      window.music.play().catch(() => {});
    }
  });

})();
</script>

<script>
window.addEventListener("load", () => {
  document.getElementById("music").play().catch(()=>{});
});
</script>

</body>
</html>
