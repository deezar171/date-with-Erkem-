<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Выбор</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#ffd6e8,#ffeaf3);
  overflow:hidden;
}

.card{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:25px;
  border-radius:20px;
  text-align:center;
}

.day{
  display:inline-block;
  padding:10px;
  margin:5px;
  background:#ff4d88;
  color:white;
  border-radius:10px;
  cursor:pointer;
}

button{
  margin:5px;
  padding:10px;
  border-radius:10px;
  border:none;
  background:#ff4d88;
  color:white;
}

/* эффекты */
.heart,.flower{
  position:absolute;
  pointer-events:none;
}

.heart{
  color:white;
  font-size:18px;
  animation:float 6s linear infinite;
}

.flower{
  font-size:20px;
  animation:fall 10s linear infinite;
}

@keyframes float{
  0%{transform:translateY(100vh);opacity:0;}
  20%{opacity:1;}
  100%{transform:translateY(-10vh);opacity:0;}
}

@keyframes fall{
  0%{transform:translateY(-10vh);opacity:0;}
  20%{opacity:1;}
  100%{transform:translateY(110vh);opacity:0;}
}
</style>
</head>

<body>

<div class="card">
  <h2>Дата 📅</h2>

  <div>
    <div class="day" onclick="setDay(26)">26</div>
    <div class="day" onclick="setDay(27)">27</div>
    <div class="day" onclick="setDay(28)">28</div>
  </div>

  <br>

  <input id="time" type="time" min="13:00" max="23:00">

  <h3>Еда 🍽️</h3>

  <button onclick="choose('🍕 Пицца')">🍕</button>
  <button onclick="choose('🍔 Бургер')">🍔</button>
  <button onclick="choose('🍣 Суши')">🍣</button>
  <button onclick="choose('🍝 Паста')">🍝</button>
  <button onclick="choose('🚶 Прогулка')">🚶</button>
  <button onclick="choose('🍜 Рамен')">🍜</button>
  <button onclick="choose('🏠 Ночёвка')">🏠</button>
</div>

<script>
let day=26;

function setDay(d){day=d;}

function choose(place){
  localStorage.setItem("day",day);
  localStorage.setItem("time",document.getElementById("time").value);
  localStorage.setItem("place",place);
  location.href="result.html";
}

/* эффекты */
setInterval(()=>{
  const h=document.createElement("div");
  h.className="heart";
  h.innerHTML="🤍";
  h.style.left=Math.random()*100+"vw";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),6000);
},300);

setInterval(()=>{
  const f=document.createElement("div");
  f.className="flower";
  f.innerHTML="🌸";
  f.style.left=Math.random()*100+"vw";
  document.body.appendChild(f);
  setTimeout(()=>f.remove(),10000);
},500);
</script>

</body>
</html>
