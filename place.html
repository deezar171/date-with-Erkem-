<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Final</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#ffd6e8,#ffeaf3);
  overflow:hidden;
}

.card{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:40px;
  border-radius:20px;
  text-align:center;
  z-index:2;
}

h1{
  font-size:32px;
  color:#ff4d88;
}
</style>
</head>

<body>

<div class="card">
  <h1>бейбигерл буду ждать вас 🤍</h1>
  <p id="info"></p>
</div>

<script>
const day = localStorage.getItem("day") || "не выбрано";
const time = localStorage.getItem("time") || "не выбрано";
const place = localStorage.getItem("place") || "не выбрано";

document.getElementById("info").innerHTML =
`📅 ${day}<br>⏰ ${time}<br>🍽️ ${place}`;

/* ===== TELEGRAM SEND ===== */

function sendTelegram(){
  const token = "YOUR_BOT_TOKEN_HERE";   // <-- вставь токен
  const chat_id = "YOUR_CHAT_ID_HERE";   // <-- вставь chat id

  const text =
`💌 Новое свидание!
📅 Дата: ${day}
⏰ Время: ${time}
🍽️ Место: ${place}`;

  fetch(`https://api.telegram.org/bot7949849167:AAHXQGrqZsH2QJvMWroHpk5_SZnhWXeK6TQ/sendMessage`, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      chat_id: chat_id,
      text: text
    })
  });
}

/* отправка при загрузке страницы */
sendTelegram();
</script>

</body>
</html>
