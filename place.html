<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Выбор</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#ffd6e8,#ffeaf3);
  overflow:hidden;
}

.card{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:30px;
  border-radius:20px;
  text-align:center;
  width:360px;
  z-index:2;
}

h2{
  font-size:22px;
}

/* ===== DATE ===== */
.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
}

.day{
  padding:10px;
  border-radius:10px;
  background:#eee;
  cursor:pointer;
  transition:0.2s;
}

.day.active{
  background:#ff4d88;
  color:white;
  transform:scale(1.1);
}

/* ❌ disabled but visible */
.day.disabled{
  opacity:0.25;
  cursor:not-allowed;
}

/* ===== TIME ===== */
.times{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:8px;
}

.time-btn{
  padding:10px 14px;
  border:none;
  border-radius:12px;
  background:#ffb3cc;
  color:white;
  cursor:pointer;
  transition:0.2s;
}

.time-btn.active{
  background:#ff4d88;
  transform:scale(1.15);
}
