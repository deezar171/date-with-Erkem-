<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Выбор</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#ffd6e8,#ffeaf3);
  overflow:hidden;
}

.card{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:30px;
  border-radius:20px;
  text-align:center;
  width:380px;
  z-index:2;
}

/* ===== DATE ===== */
.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
  margin-top:10px;
}

.day{
  padding:10px;
  border-radius:10px;
  background:#eee;
  cursor:pointer;
  transition:0.2s;
}

.day.active{
  background:#ff4d88;
  color:white;
  transform:scale(1.1);
}

.day.disabled{
  opacity:0.25;
  pointer-events:none;
}

/* ===== TIME GRID ===== */
.time-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  margin-top:10px;
}

.time-btn{
  padding:10px;
  border:none;
  border-radius:10px;
  background:#ffb3cc;
  color:white;
  cursor:pointer;
  transition:0.2s;
}

.time-btn.active{
  background:#ff4d88;
  transform:scale(1.1);
}

/* ===== FOOD ===== */
.food{
  margin:4px;
  padding:8px 10px;
  border:none;
  border-radius:10px;
  background:#ff4d88;
  color:white;
  cursor:pointer;
  transition:0.2s;
}

.food.active{
  transform:scale(1.1);
  box-shadow:0 0 10px rgba(255,77,136,0.5);
}

/* ===== FALLING EFFECT ===== */
.fall{
  position:fixed;
  top:-10px;
  font-size:22px;
  animation: fall linear infinite;
  pointer-events:none;
  z-index:1;
}

@keyframes fall{
  0%{
    transform:translateY(-10vh) rotate(0deg);
    opacity:1;
  }
  100%{
    transform:translateY(110vh) rotate(360deg);
    opacity:0;
  }
}
</style>
</head>

<body>

<!-- 🎵 MUSIC (ДОБАВЛЕНО) -->
<audio id="bgmusic" src="brent.mp3" loop></audio>

<div class="card">

<h2>📅 Дата</h2>

<div class="calendar">
<script>
for(let i=1;i<=31;i++){
  if([26,28,29].includes(i)){
    document.write(`<div class="day" onclick="setDay(this,${i})">${i}</div>`);
  } 
  else if(i === 27){
    document.write(`<div class="day disabled" title="Занято">${i}</div>`);
  }
  else {
    document.write(`<div class="day disabled">${i}</div>`);
  }
}
</script>
</div>

<h2>⏰ Время</h2>

<div class="time-grid">
<script>
for(let h=13; h<=22; h++){
  let t = h + ":00";
  document.write(`<button class="time-btn" onclick="setTime(this,'${t}')">${t}</button>`);
}
</script>
</div>

<h2>🍽️ Еда</h2>

<button class="food" onclick="setFood(this,'🍕 Пицца')">🍕 Пицца</button>
<button class="food" onclick="setFood(this,'🍔 Бургер')">🍔 Бургер</button>
<button class="food" onclick="setFood(this,'🍣 Суши')">🍣 Суши</button>
<button class="food" onclick="setFood(this,'🍝 Паста')">🍝 Паста</button>
<button class="food" onclick="setFood(this,'🍜 Рамен')">🍜 Рамен</button>
<button class="food" onclick="setFood(this,'🏠 Ночёвка')">🏠 Ночёвка</button>

<br><br>
<button onclick="finish()">💗 Подтвердить</button>

</div>

<script>
let day = 26;
let time = "13:00";
let food = "";

/* ===== MUSIC START ===== */
window.addEventListener("load", () => {
  const music = document.getElementById("bgmusic");
  music.volume = 1;
  music.play().catch(()=>{});

  document.addEventListener("click", () => {
    music.play().catch(()=>{});
  }, { once:true });
});

/* ===== SELECT FUNCTIONS ===== */
function setDay(el,d){
  day = d;
  document.querySelectorAll(".day").forEach(x=>x.classList.remove("active"));
  el.classList.add("active");
}

function setTime(el,t){
  time = t;
  document.querySelectorAll(".time-btn").forEach(x=>x.classList.remove("active"));
  el.classList.add("active");
}

function setFood(el,f){
  food = f;
  document.querySelectorAll(".food").forEach(x=>x.classList.remove("active"));
  el.classList.add("active");
}

/* ===== FINISH ===== */
function finish(){
  localStorage.setItem("day",day);
  localStorage.setItem("time",time);
  localStorage.setItem("place",food);
  location.href="result.html";
}

/* ===== FALLING HEARTS + FLOWERS ===== */
function createFall(){
  const el = document.createElement("div");
  el.classList.add("fall");

  const items = ["🤍","🌸","🤍","🌸","💮"];
  el.innerText = items[Math.floor(Math.random()*items.length)];

  el.style.left = Math.random()*100 + "vw";
  el.style.animationDuration = (3 + Math.random()*4) + "s";
  el.style.fontSize = (16 + Math.random()*18) + "px";

  document.body.appendChild(el);

  setTimeout(()=>el.remove(), 8000);
}

setInterval(createFall, 200);
</script>

</body>
</html>
