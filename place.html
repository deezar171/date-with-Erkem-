<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Выбор</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#ffd6e8,#ffeaf3);
  overflow:hidden;
}

.card{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:30px;
  border-radius:20px;
  text-align:center;
  width:380px;
}

/* ===== TITLES ===== */
h2{
  font-size:20px;
  margin:10px 0;
}

/* ===== DATE ===== */
.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
}

.day{
  padding:10px;
  border-radius:10px;
  background:#eee;
  cursor:pointer;
  transition:0.2s;
}

.day.active{
  background:#ff4d88;
  color:white;
  transform:scale(1.1);
}

.day.disabled{
  opacity:0.3;
  pointer-events:none;
}

/* ===== TIME ICONS ===== */
.times{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:6px;
}

.time-btn{
  padding:8px 10px;
  border:none;
  border-radius:10px;
  background:#ffb3cc;
  color:white;
  cursor:pointer;
  transition:0.2s;
}

.time-btn.active{
  background:#ff4d88;
  transform:scale(1.15);
}

/* ===== FOOD ===== */
.food{
  margin:4px;
  padding:8px 10px;
  border:none;
  border-radius:10px;
  background:#ff4d88;
  color:white;
  cursor:pointer;
  transition:0.2s;
}

.food.active{
  transform:scale(1.1);
  box-shadow:0 0 10px rgba(255,77,136,0.5);
}
</style>
</head>

<body>

<div class="card">

<h2>📅 Дата</h2>

<div class="calendar">
<script>
for(let i=1;i<=31;i++){
  if([26,27,28,29].includes(i)){
    document.write(`<div class="day" onclick="setDay(this,${i})">${i}</div>`);
  } else {
    document.write(`<div class="day disabled">${i}</div>`);
  }
}
</script>
</div>

<h2>⏰ Время</h2>

<div class="times">
<script>
for(let t=13;t<=22;t++){
  let time = t + ":00";
  document.write(`<button class="time-btn" onclick="setTime(this,'${time}')">${time}</button>`);
}
</script>
</div>

<h2>🍽️ Еда</h2>

<button class="food" onclick="setFood(this,'🍕 Пицца')">🍕 Пицца</button>
<button class="food" onclick="setFood(this,'🍔 Бургер')">🍔 Бургер</button>
<button class="food" onclick="setFood(this,'🍣 Суши')">🍣 Суши</button>
<button class="food" onclick="setFood(this,'🍝 Паста')">🍝 Паста</button>
<button class="food" onclick="setFood(this,'🍜 Рамен')">🍜 Рамен</button>
<button class="food" onclick="setFood(this,'🏠 Ночёвка')">🏠 Ночёвка</button>

<br><br>
<button onclick="finish()">💗 Подтвердить</button>

</div>

<script>
let day = 26;
let time = "13:00";
let food = "";

/* ===== MUSIC (GLOBAL STYLE FIX) ===== */
if(!window.music){
  window.music = new Audio("brent.mp3");
  window.music.loop = true;
  window.music.volume = 1;

  // ПЫТАЕМСЯ СРАЗУ ИГРАТЬ
  window.music.play().catch(()=>{});
}

/* fallback — если браузер блокнул */
document.addEventListener("click", () => {
  window.music.play().catch(()=>{});
}, { once:true });

/* ===== SELECT ===== */
function setDay(el,d){
  day = d;
  document.querySelectorAll(".day").forEach(x=>x.classList.remove("active"));
  el.classList.add("active");
}

function setTime(el,t){
  time = t;
  document.querySelectorAll(".time-btn").forEach(x=>x.classList.remove("active"));
  el.classList.add("active");
}

function setFood(el,f){
  food = f;
  document.querySelectorAll(".food").forEach(x=>x.classList.remove("active"));
  el.classList.add("active");
}

/* ===== FINISH ===== */
function finish(){
  localStorage.setItem("day",day);
  localStorage.setItem("time",time);
  localStorage.setItem("place",food);
  location.href="result.html";
}
</script>

</body>
</html>
