<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Выбор</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#ffd6e8,#ffeaf3);
  overflow:hidden;
}

.card{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:30px;
  border-radius:20px;
  text-align:center;
}

.day{
  display:inline-block;
  padding:10px;
  margin:5px;
  background:#ff4d88;
  color:white;
  border-radius:10px;
  cursor:pointer;
}

button{
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#ff4d88;
  color:white;
}
</style>
</head>

<body>

<div class="card">

<h2>📅 Выбери день</h2>

<div>
  <div class="day" onclick="setDay(26)">26</div>
  <div class="day" onclick="setDay(27)">27</div>
  <div class="day" onclick="setDay(28)">28</div>
  <div class="day" onclick="setDay(29)">29</div>
</div>

<br>

<input id="time" type="time" min="13:00" max="23:00">

<br><br>

<button onclick="finish('🍕 Пицца')">🍕 Пицца</button>
<button onclick="finish('🍔 Бургер')">🍔 Бургер</button>
<button onclick="finish('🍣 Суши')">🍣 Суши</button>
<button onclick="finish('🍝 Паста')">🍝 Паста</button>
<button onclick="finish('🍜 Рамен')">🍜 Рамен</button>
<button onclick="finish('🏠 Ночёвка')">🏠 Ночёвка</button>

</div>

<script>
let day=26;

function setDay(d){
  day=d;
}

function finish(place){
  localStorage.setItem("day",day);
  localStorage.setItem("time",document.getElementById("time").value);
  localStorage.setItem("place",place);
  location.href="result.html";
}
</script>

<!-- 🎵 МУЗЫКА (ИСПРАВЛЕНО) -->
<script>
(function () {

  if (!window.__music) {
    window.__music = new Audio("brent.mp3");
    window.__music.loop = true;
    window.__music.volume = 1;
  }

  window.addEventListener("load", () => {
    window.__music.play().catch(() => {});
  });

})();
</script>

</body>
</html>
