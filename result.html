<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Final</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#ffd6e8,#ffeaf3);
  overflow:hidden;
}

.card{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:40px;
  border-radius:20px;
  text-align:center;
  z-index:2;
}

h1{
  font-size:32px;
  color:#ff4d88;
}
</style>
</head>

<body>

<div class="card">
  <h1>бейбигерл буду ждать вас 🤍</h1>
  <p>
    📅 <script>document.write(localStorage.getItem("day"))</script><br>
    ⏰ <script>document.write(localStorage.getItem("time"))</script><br>
    🍽️ <script>document.write(localStorage.getItem("place"))</script>
  </p>
</div>

</body>
</html>
