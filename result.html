<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Final</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#ffd6e8,#ffeaf3);
  overflow:hidden;
}

.card{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:40px;
  border-radius:20px;
  text-align:center;
  z-index:2;
}

h1{
  font-size:32px;
  color:#ff4d88;
}
</style>
</head>

<body>

<div class="card">
  <h1>бейбигерл буду ждать вас 🤍</h1>
  <p id="info"></p>
</div>

<script>
const day = localStorage.getItem("day") || "не выбрано";
const time = localStorage.getItem("time") || "не выбрано";
const place = localStorage.getItem("place") || "не выбрано";

document.getElementById("info").innerHTML =
`📅 ${day}<br>⏰ ${time}<br>🍽️ ${place}`;
</script>

<script>
function createFalling(){
  const item = document.createElement("div");
  item.innerHTML = Math.random() > 0.5 ? "🤍" : "🌸";

  item.style.position = "fixed";
  item.style.left = Math.random()*100 + "vw";
  item.style.top = "-30px";
  item.style.fontSize = (18 + Math.random()*20) + "px";
  item.style.pointerEvents = "none";
  item.style.zIndex = "0";

  document.body.appendChild(item);

  setTimeout(()=>{
    item.style.transform = "translateY(110vh)";
    item.style.transition = "6s linear";
  },50);

  setTimeout(()=>item.remove(),6000);
}

setInterval(createFalling, 500);
</script>

</body>
</html>
