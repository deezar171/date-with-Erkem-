<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Final</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#ffd6e8,#ffeaf3);
  overflow:hidden;
}

.card{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:40px;
  border-radius:20px;
  text-align:center;
}

h1{
  font-size:32px;
  color:#ff4d88;
}
</style>
</head>

<body>

<div class="card">
  <h1> бейбигерл буду ждать вас 🤍</h1>

  <p id="info"></p>
</div>

<script>
document.getElementById("info").innerHTML =
"📅 " + localStorage.getItem("day") + "<br>" +
"⏰ " + localStorage.getItem("time") + "<br>" +
"🍽️ " + localStorage.getItem("place");
</script>

<!-- 🎵 МУЗЫКА (ИСПРАВЛЕНО) -->
<script>
(function () {

  if (!window.__music) {
    window.__music = new Audio("brent.mp3");
    window.__music.loop = true;
    window.__music.volume = 1;
  }

  window.addEventListener("load", () => {
    window.__music.play().catch(() => {});
  });

})();
</script>

</body>
</html>
