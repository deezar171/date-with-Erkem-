<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Final</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#ffd6e8,#ffeaf3);
  overflow:hidden;
}

.card{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:30px;
  border-radius:20px;
  text-align:center;
  color:#ff4d88;
}

/* эффекты */
.heart,.flower{
  position:absolute;
  pointer-events:none;
}

.heart{
  color:white;
  font-size:18px;
  animation:float 6s linear infinite;
}

.flower{
  font-size:20px;
  animation:fall 10s linear infinite;
}

@keyframes float{
  0%{transform:translateY(100vh);opacity:0;}
  20%{opacity:1;}
  100%{transform:translateY(-10vh);opacity:0;}
}

@keyframes fall{
  0%{transform:translateY(-10vh);opacity:0;}
  20%{opacity:1;}
  100%{transform:translateY(110vh);opacity:0;}
}
</style>
</head>

<body>

<div class="card">
  <h1>💗 бейбигерл буду ждать вас 🤍</h1>

  <p id="info"></p>
</div>

<script>
document.getElementById("info").innerHTML =
"📅 " + localStorage.getItem("day") + "<br>" +
"⏰ " + localStorage.getItem("time") + "<br>" +
"🍽️ " + localStorage.getItem("place");
</script>

<script>
setInterval(()=>{
  const h=document.createElement("div");
  h.className="heart";
  h.innerHTML="🤍";
  h.style.left=Math.random()*100+"vw";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),6000);
},300);

setInterval(()=>{
  const f=document.createElement("div");
  f.className="flower";
  f.innerHTML="🌸";
  f.style.left=Math.random()*100+"vw";
  document.body.appendChild(f);
  setTimeout(()=>f.remove(),10000);
},500);
</script>

</body>
</html>
